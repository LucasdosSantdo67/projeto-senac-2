<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetAlerta - Encontre seu Amigo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">PetAlerta</div>
        <nav>
            <a href="#mural">Ver Animais</a>
            <a href="#cadastro" class="btn-nav">Anunciar Pet</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Ajude a reencontrar quem espalha amor</h1>
        <p>Preencha os dados abaixo para registrar um animal perdido, encontrado ou disponível para adoção.</p>
    </section>

    <div class="container">
        
        <section id="cadastro" class="card-form">
            <h2>Cadastrar Animal Perdido / Encontrado / Adoção</h2>
            <form id="petForm">
                <div class="form-group">
                    <label for="petName">Nome do Pet (se souber):</label>
                    <input type="text" id="petName" placeholder="Ex: Bob, Mel...">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="petType">Tipo de Animal:</label>
                        <select id="petType" required>
                            <option value="Cachorro">Cachorro</option>
                            <option value="Gato">Gato</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="petStatus">Status:</label>
                        <select id="petStatus" required>
                            <option value="Perdido">Perdido</option>
                            <option value="Encontrado">Encontrado</option>
                            <option value="Adocao">Para Adoção</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="petLocation">Endereço ou Bairro de referência:</label>
                    <input type="text" id="petLocation" placeholder="Ex: Centro, próximo ao banco" required>
                </div>

                <div class="form-group">
                    <label for="petContact">Telefone de Contato (com DDD):</label>
                    <input type="tel" id="petContact" placeholder="Ex: 11999999999" required>
                </div>

                <div class="form-group">
                    <label for="petPhoto">URL da Foto do Pet:</label>
                    <input type="url" id="petPhoto" placeholder="Cole o link de uma imagem da internet" required>
                </div>

                <button type="submit" class="btn-submit">Publicar Alerta</button>
            </form>
        </section>

        <section class="search-filters">
            <h2>Animais Registrados</h2>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterPets('Todos')">Todos</button>
                <button class="filter-btn" onclick="filterPets('Perdido')">Perdidos</button>
                <button class="filter-btn" onclick="filterPets('Encontrado')">Encontrados</button>
                <button class="filter-btn" onclick="filterPets('Adocao')">Para Adoção</button>
            </div>
        </section>

        <main id="mural" class="mural-grid">
            </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
